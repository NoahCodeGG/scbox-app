# Build a Windows installer for scbox-app via tauri-action.
#
# NOTE: This is an UNSIGNED build. On first run, Windows SmartScreen will show a
# "Windows protected your PC" warning. This is expected for unsigned binaries —
# choose "More info" -> "Run anyway". Code signing is out of scope for now.
#
# Output: the .msi and NSIS .exe installers are uploaded as a workflow artifact
# ("scbox-app-windows"). No GitHub Release is created.
#
# DEFERRED (future tasks):
# - S4 Auto-update: needs a `tauri signer generate` keypair (public key in
#   tauri.conf.json; private key + password as GitHub secrets), plus this
#   workflow creating GitHub Releases with a `latest.json` updater endpoint.
# - S5 Windows code signing: removes the SmartScreen warning but needs a paid
#   code-signing certificate; out of practical scope for now.

name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # No `version` here: pnpm/action-setup reads the "packageManager" field
      # in package.json (pnpm@10.12.1) so CI and dev cannot drift.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: pnpm test

      - name: Run Rust tests
        run: cargo test
        working-directory: src-tauri

      # tauri-action runs `beforeBuildCommand` (pnpm build) then `tauri build`.
      # Omitting tagName/releaseId means it builds the bundle WITHOUT creating a
      # GitHub Release.
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: scbox-app-windows
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
