# CI gate for scbox-app.
#
# Runs the test suite + a full Tauri build on every push to main and every PR
# to main (and on manual dispatch). The build validates that the packaging
# chain still works; no artifacts are uploaded and no release is created.
#
# Formal releases are handled by release.yml (tag-triggered).

name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # No `version` here: pnpm/action-setup reads the "packageManager" field
      # in package.json (pnpm@10.12.1) so CI and dev cannot drift.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: pnpm test

      - name: Run Rust tests
        run: cargo test
        working-directory: src-tauri

      # tauri-action runs `beforeBuildCommand` (pnpm build) then `tauri build`.
      # Omitting tagName/releaseId means it builds the bundle WITHOUT creating a
      # GitHub Release.
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
